<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Nexus IDE en números">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12071f"/>
      <stop offset="1" stop-color="#0b0f19"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#3fb950"/>
    </linearGradient>
  </defs>

  <rect width="900" height="430" rx="18" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="899" height="429" rx="18" fill="none" stroke="#7c3aed" stroke-opacity="0.35"/>

  <!-- Header -->
  <text x="40" y="58" font-size="30" font-weight="700" fill="#f3f4f6">🌌 Nexus IDE</text>
  <text x="40" y="86" font-size="14" fill="#8b949e">IDE de escritorio con IA agéntica multi-proveedor · offline-first · Windows · Linux · macOS</text>
  <g transform="translate(760,38)">
    <rect width="100" height="26" rx="13" fill="#7c3aed" fill-opacity="0.18" stroke="url(#violet)"/>
    <text x="50" y="17" font-size="13" font-weight="600" fill="#c4b5fd" text-anchor="middle">v2.1.0 · MIT</text>
  </g>

  <!-- Stat tiles -->
  <g>
    <!-- row 1 -->
    <g transform="translate(40,110)">
      <rect width="260" height="86" rx="12" fill="#161b22" stroke="#30363d"/>
      <text x="20" y="48" font-size="38" font-weight="800" fill="#a78bfa">64</text>
      <text x="20" y="70" font-size="13" fill="#8b949e">tests automatizados (CI ✓)</text>
    </g>
    <g transform="translate(320,110)">
      <rect width="260" height="86" rx="12" fill="#161b22" stroke="#30363d"/>
      <text x="20" y="48" font-size="38" font-weight="800" fill="#a78bfa">18</text>
      <text x="20" y="70" font-size="13" fill="#8b949e">proveedores de IA (13 nube · 5 local)</text>
    </g>
    <g transform="translate(600,110)">
      <rect width="260" height="86" rx="12" fill="#161b22" stroke="#30363d"/>
      <text x="20" y="48" font-size="38" font-weight="800" fill="#a78bfa">13</text>
      <text x="20" y="70" font-size="13" fill="#8b949e">capacidades agénticas</text>
    </g>
    <!-- row 2 -->
    <g transform="translate(40,210)">
      <rect width="260" height="86" rx="12" fill="#161b22" stroke="#30363d"/>
      <text x="20" y="48" font-size="38" font-weight="800" fill="#a78bfa">6</text>
      <text x="20" y="70" font-size="13" fill="#8b949e">módulos JS testeables</text>
    </g>
    <g transform="translate(320,210)">
      <rect width="260" height="86" rx="12" fill="#161b22" stroke="#30363d"/>
      <text x="20" y="48" font-size="38" font-weight="800" fill="#a78bfa">8</text>
      <text x="20" y="70" font-size="13" fill="#8b949e">formatos de instalación (SO)</text>
    </g>
    <g transform="translate(600,210)">
      <rect width="260" height="86" rx="12" fill="#161b22" stroke="#30363d"/>
      <text x="20" y="48" font-size="38" font-weight="800" fill="#a78bfa">0</text>
      <text x="20" y="70" font-size="13" fill="#8b949e">dependencias de runtime en tests</text>
    </g>
  </g>

  <!-- Capability completeness bar -->
  <g transform="translate(40,320)">
    <text x="0" y="14" font-size="13" fill="#c9d1d9">Núcleo agéntico — capacidades implementadas</text>
    <text x="780" y="14" font-size="13" font-weight="700" fill="#3fb950" text-anchor="end">13 / 13</text>
    <rect x="0" y="26" width="780" height="14" rx="7" fill="#21262d"/>
    <rect x="0" y="26" width="780" height="14" rx="7" fill="url(#bar)"/>
  </g>

  <text x="40" y="400" font-size="12" fill="#6e7681">Redacción de secretos · Read tools · Tool-calling nativo · Bucle ReAct · Memoria persistente · Sandbox Docker · Cliente MCP</text>
  <text x="40" y="418" font-size="12" fill="#6e7681">Streaming SSE · Mixture-of-Agents · Fallback de proveedores · Auto-skills · Cron scheduler · Supervisor Cardinal</text>
</svg>
